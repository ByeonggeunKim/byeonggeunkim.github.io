name: Validate site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  html-validate:
    name: HTML & link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML5 validate
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
          ignore: |
            attribute "rel" not allowed on element "a" at this point
        # html5validator only flags real syntax errors. Tolerant by default.

      - name: Link check (markdown + html)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-redirects 5
            --accept 200,206,403,429
            --exclude-path .git
            --exclude-path .github
            './**/*.html'
          fail: true
        # Some sites (LinkedIn, Google Scholar) return 403/429 to bots — explicitly allowed.
